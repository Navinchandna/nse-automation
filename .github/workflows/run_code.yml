name: NSE Auto Refresh Daily

on:
  schedule:
    # 17:00 UTC = रात 10:30 बजे भारतीय समयानुसार (IST)
    - cron: '0 17 * * *'
  workflow_dispatch: # इससे आप खुद मैन्युअल बटन दबाकर भी रन कर सकते हैं

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
    - name: Copy Repository Code
      uses: actions/checkout@v4

    - name: Load Python 3.11 Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # यहाँ हमने वर्ज़न अपग्रेड कर दिया
        
    # ... पुराना ऊपर का कोड वैसा ही रहने दें (Install Trading Libraries तक) ...

      - name: Execute Live Tracker
        env:
          MY_SECRET_KEY: ${{ secrets.MY_SECRET_KEY }}
        run: |
          # सीक्रेट को सीधे एक सीक्रेट फाइल में राइट करना
          echo "$MY_SECRET_KEY" > google_creds.json
          python final_script.pyts.MY_SECRET_KEY }}
      run: python final_script.py
